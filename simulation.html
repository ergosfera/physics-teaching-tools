<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-container {
            display: grid;
            grid-template-columns: 70% 30%;
            height: 100vh;
            gap: 3px;
            padding: 3px;
            background: #000;
        }

        .left-zone {
            display: grid;
            grid-template-rows: 50% 50%;
            gap: 3px;
            background: #000;
        }

        .upper-left {
            background: #000;
            border: 2px solid #0099ff;
            position: relative;
            overflow: hidden;
        }

        .starfield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .space-objects {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
        }

        .celestial-object {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: #0099ff;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 1px;
            text-align: center;
        }

        .planet-icon {
            font-size: 10px;
        }

        .galaxy-icon {
            font-size: 10px;
        }

        svg.waves {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .light-pulse {
            fill: #0099ff;
            filter: drop-shadow(0 0 3px #0099ff);
        }

        .lower-left {
            display: grid;
            grid-template-columns: 50% 50%;
            gap: 3px;
            background: #000;
        }

        .lower-left-sub {
            background: #000;
            border: 2px solid #0099ff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0099ff;
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .right-zone {
            background: #000;
            border: 2px solid #0099ff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0099ff;
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="left-zone">
            <div class="upper-left">
                <canvas class="starfield" id="starCanvas"></canvas>
                <svg class="waves" id="wavesSVG"></svg>
                <div class="space-objects">
                    <div class="celestial-object">
                        <div class="planet-icon">🌍</div>
                        <span>Aurora</span>
                    </div>
                    <div class="celestial-object">
                        <div class="galaxy-icon">🌀</div>
                        <span>Coriolis</span>
                    </div>
                    <div class="celestial-object">
                        <div class="planet-icon">🌎</div>
                        <span>Borealis</span>
                    </div>
                </div>
            </div>
            <div class="lower-left">
                <div class="lower-left-sub">Lower Left (25%)</div>
                <div class="lower-left-sub">Lower Right (25%)</div>
            </div>
        </div>
        <div class="right-zone">Right Zone (30%)</div>
    </div>

    <script>
        // Initialize starfield
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        const container = canvas.parentElement;

        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            drawStars();
        }

        function drawStars() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const starCount = 150;
            ctx.fillStyle = '#fff';

            for (let i = 0; i < starCount; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const radius = Math.random() * 1.5;
                const opacity = Math.random() * 0.7 + 0.3;

                ctx.globalAlpha = opacity;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Draw waves from Coriolis to planets
        function drawWaves() {
            const svg = document.getElementById('wavesSVG');
            const container = svg.parentElement;
            svg.setAttribute('viewBox', `0 0 ${container.clientWidth} ${container.clientHeight}`);

            // Get actual positions of the celestial objects
            const celestialObjects = container.querySelectorAll('.celestial-object');
            const auroraIcon = celestialObjects[0].querySelector('.planet-icon');
            const coriolisIcon = celestialObjects[1].querySelector('.galaxy-icon');
            const borealisIcon = celestialObjects[2].querySelector('.planet-icon');

            const getElementCenter = (element) => {
                const rect = element.getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();
                const x = rect.left - containerRect.left + rect.width / 2;
                const y = rect.top - containerRect.top + rect.height / 2;
                return { x, y };
            };

            const auroraPos = getElementCenter(auroraIcon);
            const coriolisPos = getElementCenter(coriolisIcon);
            const borealisPos = getElementCenter(borealisIcon);

            const auroraX = auroraPos.x;
            const auroraY = auroraPos.y;

            const coriolisX = coriolisPos.x;
            const coriolisY = coriolisPos.y;

            const borealisX = borealisPos.x;
            const borealisY = borealisPos.y;

            // Clear previous lines
            svg.innerHTML = '';

            // Function to create traveling light pulses
            function createPulses(startX, startY, endX, endY) {
                const pulseCount = 4;
                const pulseRadius = 3;

                for (let p = 0; p < pulseCount; p++) {
                    const pulse = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    pulse.setAttribute('r', pulseRadius);
                    pulse.setAttribute('class', 'light-pulse');
                    pulse.setAttribute('cx', startX);
                    pulse.setAttribute('cy', startY);

                    const delay = (p * 0.5);

                    // Animate X
                    const animateX = document.createElementNS('http://www.w3.org/2000/svg', 'animate');
                    animateX.setAttribute('attributeName', 'cx');
                    animateX.setAttribute('from', startX);
                    animateX.setAttribute('to', endX);
                    animateX.setAttribute('dur', '2s');
                    animateX.setAttribute('repeatCount', 'indefinite');
                    animateX.setAttribute('begin', `${delay}s`);
                    pulse.appendChild(animateX);

                    // Animate Y
                    const animateY = document.createElementNS('http://www.w3.org/2000/svg', 'animate');
                    animateY.setAttribute('attributeName', 'cy');
                    animateY.setAttribute('from', startY);
                    animateY.setAttribute('to', endY);
                    animateY.setAttribute('dur', '2s');
                    animateY.setAttribute('repeatCount', 'indefinite');
                    animateY.setAttribute('begin', `${delay}s`);
                    pulse.appendChild(animateY);

                    // Animate opacity
                    const animateOpacity = document.createElementNS('http://www.w3.org/2000/svg', 'animate');
                    animateOpacity.setAttribute('attributeName', 'opacity');
                    animateOpacity.setAttribute('from', '1');
                    animateOpacity.setAttribute('to', '0.2');
                    animateOpacity.setAttribute('dur', '2s');
                    animateOpacity.setAttribute('repeatCount', 'indefinite');
                    animateOpacity.setAttribute('begin', `${delay}s`);
                    pulse.appendChild(animateOpacity);

                    svg.appendChild(pulse);
                }
            }

            // Create pulses from Coriolis to Aurora
            createPulses(coriolisX, coriolisY, auroraX, auroraY);

            // Create pulses from Coriolis to Borealis
            createPulses(coriolisX, coriolisY, borealisX, borealisY);
        }

        drawWaves();
        window.addEventListener('resize', drawWaves);
    </script>
</body>
</html>
